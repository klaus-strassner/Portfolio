<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klaus Strassner</title>
    <link rel="stylesheet" href="styles.css">
    <meta name="google-site-verification" content="Ui3ZwumRiU5YnxxfcN7nwC0uKyw3u6Z3zXkQz4oDZbk"/>
</head>
<body>
    <div id="loader">LOADING...</div>

    <main class="main-grid" id="grid">
        <div class="grid-item esports" data-title="ESPORTS"><div class="content"><h2 class="title">ESPORTS</h2></div></div>
        <div class="grid-item about" data-title="ABOUT"><div class="content"><h2 class="title">ABOUT</h2></div></div>
        <div class="grid-item projects" data-title="PROJECTS"><div class="content"><h2 class="title">PROJECTS</h2></div></div>
        <div class="grid-item quad" data-title="EDUCATION"><div class="content"><h2 class="title">EDUCATION</h2></div></div>
        <div class="grid-item quad" data-title="EXPERIENCE"><div class="content"><h2 class="title">EXPERIENCE</h2></div></div>
        <div class="grid-item quad" data-title="SKILLS"><div class="content"><h2 class="title">SKILLS</h2></div></div>
        <div class="grid-item quad" data-title="CONTACT"><div class="content"><h2 class="title">CONTACT</h2></div></div>
    </main>

    <div id="overlay" class="overlay">
        <div class="overlay-header"><button class="close-btn" id="closeOverlay">close / ESC</button></div>
        <h2 id="overlayTitle"></h2>
        <div id="overlayBody"></div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
