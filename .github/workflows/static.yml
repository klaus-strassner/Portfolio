name: Sync and Deploy

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trigger Fresh LinkedIn Scrape
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          curl -sfX POST "https://api.apify.com/v2/actor-tasks/klaus-strassner~fetch-linkedin/run-sync-get-dataset-items?token=${{ secrets.APIFY_TOKEN }}&timeout=300" \
               -H "Content-Type: application/json" > data/linkedin.json

      - name: Fetch Last Cached Data
        if: github.event_name == 'push'
        run: |
          echo "Fetching last cached data from Apify..."
          curl -sf "https://api.apify.com/v2/actor-tasks/klaus-strassner~fetch-linkedin/runs/last/dataset/items?token=${{ secrets.APIFY_TOKEN }}&status=SUCCEEDED" > data/linkedin.json

      - name: Fetch Liquipedia Data
        run: |
          curl -sf --compressed -H "User-Agent: PortfolioUpdater (contact@klausstrassner.com)" \
               "https://liquipedia.net/overwatch/api.php?action=parse&page=Zydra/Results&format=json&origin=*&prop=text" > temp_results.json

          curl -sf --compressed -H "User-Agent: PortfolioUpdater/1.0 (contact@klausstrassner.com)" \
               "https://liquipedia.net/overwatch/api.php?action=parse&page=Zydra&format=json&origin=*&prop=text&section=0" > temp_profile.json

          jq -s '{results: .[0], profile: .[1]}' temp_results.json temp_profile.json > data/liquipedia.json
          rm temp_results.json temp_profile.json

      - name: Fetch GitHub Data
        run: |
          curl -sf -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
               "https://api.github.com/users/${{ github.repository_owner }}/repos?sort=updated" > data/github.json

          touch .nojekyll

      - name: Commit Updated Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: sync sources (Trigger: ${{ github.event_name }}) [skip ci]"
          file_pattern: 'data/linkedin.json data/github.json data/liquipedia.json'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4