name: Sync and Deploy CV

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Fetch Data
        run: |
          # Fetch LinkedIn
          curl -s "https://api.apify.com/v2/actor-tasks/backfisch~fetch-cv/runs/last/dataset/items?token=${{ secrets.APIFY_TOKEN }}&status=SUCCEEDED" > cv.json
          
          # Fetch GitHub (Updated to use the more robust 'github.token' variable)
          # We added '-f' so the action FAILS if the API returns an error
          curl -f -H "Authorization: Bearer ${{ github.token }}" \
               "https://api.github.com/users/${{ github.repository_owner }}/repos?sort=updated&per_page=10" > github.json
          
          # DEBUG: This will print the first 100 characters to your Action Log
          echo "GitHub Data Preview:"
          head -c 100 github.json
          
          touch .nojekyll

      - name: Commit Updated Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: sync linkedin and github"
          file_pattern: 'cv.json github.json'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4