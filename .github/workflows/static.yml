name: Sync and Deploy CV

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Fetch Raw Data from Apify
        run: |
          # Grabs the last successful run and saves it exactly as is
          curl -s "https://api.apify.com/v2/actor-tasks/backfisch~fetch-cv/runs/last/dataset/items?token=${{ secrets.APIFY_TOKEN }}&status=SUCCEEDED" > cv.json
          
          # Ensures GitHub Pages doesn't ignore the file
          touch .nojekyll

      - name: Commit Updated CV
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: raw linkedin sync from apify"
          file_pattern: 'cv.json'
          skip_dirty_check: false 

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4