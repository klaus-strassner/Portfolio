name: Sync, Commit, and Deploy CV

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write  # Changed to 'write' so it can save the file to your repo
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          # Fetches full history so we can commit back to the branch
          fetch-depth: 0 

      - name: Fetch and Process Data
        run: |
          # Fetch the latest successful run from Apify
          curl -s "https://api.apify.com/v2/actor-tasks/backfisch~fetch-cv/runs/last/dataset/items?token=${{ secrets.APIFY_TOKEN }}&status=SUCCEEDED" > raw_cv.json
          
          # Ensure it's a single object (grabs the first item from the Apify array)
          python3 -c "import json, os; 
          if os.path.exists('raw_cv.json'):
              with open('raw_cv.json') as f:
                  data = json.load(f)
                  with open('cv.json', 'w') as out:
                      json.dump(data[0] if isinstance(data, list) and len(data) > 0 else data, out, indent=2)
          "
          
          # Clean up temporary file
          rm raw_cv.json
          
          # Create .nojekyll just in case
          touch .nojekyll

      - name: Commit Updated CV
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: sync latest linkedin snapshot from apify"
          file_pattern: 'cv.json'
          # If the file hasn't changed since last time, it won't commit
          skip_dirty_check: false 

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4